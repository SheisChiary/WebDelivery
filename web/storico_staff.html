<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storico Ordini - Staff</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #f4f7f6; display: flex; height: 100vh; color: #333; }
        .sidebar { width: 250px; background-color: #ffffff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: 700; color: #116C4A; padding: 30px 20px; text-align: center; border-bottom: 1px solid #e0e0e0; margin-bottom: 20px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; padding: 0 15px; }
        .nav-item { text-decoration: none; color: #555; font-size: 15px; font-weight: 500; padding: 12px 15px; border-radius: 8px; transition: 0.2s; }
        .nav-item:hover { background-color: #f0f5f3; color: #116C4A; }
        .nav-item.active { background-color: #116C4A; color: #ffffff; }
        .logout { margin-top: auto; margin-bottom: 20px; color: #d9534f; }
        .logout:hover { background-color: #fdf0f0; color: #c9302c; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header-top { margin-bottom: 30px; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; }
        h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .subtitle { color: #777; font-size: 14px; margin-top: 5px; }

        .table-container { background-color: #ffffff; border-radius: 10px; padding: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-size: 13px; font-weight: 600; color: #777; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0; white-space: nowrap; }
        td { padding: 15px 10px 15px 0; font-size: 14px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
        tr:last-child td { border-bottom: none; padding-bottom: 0; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .badge.inserito { background-color: #fff3cd; color: #856404; }
        .badge.inpreparazione { background-color: #cce5ff; color: #004085; }
        .badge.pronto {  background-color: #d1ecf1; color: #0c5460; }
        .badge.inconsegna { background-color: #e2d9f3; color: #4a238b; }
        .badge.consegnato { background-color: #d4edda; color: #155724; }
        .badge.annullato { background-color: #f8d7da; color: #721c24; }

        .btn-azione { background-color: transparent; border: 1px solid #116C4A; color: #116C4A; padding: 6px 12px; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-azione:hover { background-color: #116C4A; color: #ffffff; }
        .empty-state { text-align: center; color: #777; padding: 30px 0; font-style: italic; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 10px; width: 500px; max-height: 90vh; overflow-y: auto; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 20px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .close-btn:hover { color: #333; }
        .order-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 2px solid #e0e0e0; font-size: 18px; font-weight: 700; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e0e0e0; flex-direction: row; flex-wrap: wrap; align-items: center; padding-bottom: 15px; }
            .logo { width: 100%; padding: 15px; margin-bottom: 0; border-bottom: none; text-align: left; }
            .nav-menu { flex-direction: row; width: 100%; justify-content: flex-start; gap: 10px; flex-wrap: wrap; }
            .nav-item { font-size: 13px; padding: 8px 12px; }
            .logout { margin-top: 10px; }
            .main-content { padding: 15px; }
            .table-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">WebDelivery</div>
        <div class="nav-menu">
            <a href="dashboard_staff.html" class="nav-item">Gestione Ordini (Live)</a>
            <a href="#" class="nav-item active">Storico Personale</a>
        </div>
        <div class="nav-menu" style="margin-top: auto;">
            <a href="LogoutServlet" class="nav-item logout">Esci</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-top">
            <h1>Storico Ordini</h1>
            <div class="subtitle">Archivio degli ordini consegnati o annullati. Utile per verifiche e controlli.</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID ORDINE</th>
                        <th>CLIENTE</th>
                        <th>DATA E ORA CONSEGNA</th>
                        <th>TOTALE</th>
                        <th>STATO</th>
                        <th>DETTAGLI E STORICO</th>
                    </tr>
                </thead>
                <tbody id="tbody-storico">
                    <tr>
                        <td colspan="6" class="empty-state">Caricamento ordini completati...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="popupDettagli" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="popupTitolo">Dettagli Ordine</h3>
                <button class="close-btn" onclick="chiudiPopup()">&times;</button>
            </div>
            
            <div class="modal-body">
                <div id="popupListaProdotti"></div>
                <div class="order-total">
                    <span>Totale</span>
                    <span id="popupTotalePrezzo">€ 0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('GetOrdiniJson')
                .then(response => {
                    if (!response.ok) throw new Error('Errore server');
                    return response.json();
                })
                .then(data => {
                    const tbody = document.getElementById('tbody-storico');
                    tbody.innerHTML = ''; 

                    const ordiniCompletati = data.filter(o => 
                        o.stato.toLowerCase() === 'consegnato' || 
                        o.stato.toLowerCase() === 'annullato'
                    );

                    if (ordiniCompletati.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nessun ordine completato o annullato presente nel database.</td></tr>';
                        return;
                    }

                    ordiniCompletati.forEach(o => {
                        
                        let dataSicura = o.data_consegna ? o.data_consegna : (o.data_richiesta ? o.data_richiesta : "Data Assente");
                        
                        let row = `<tr>
                            <td><b>#${o.id}</b></td>
                            <td>${o.cliente}</td>
                            <td>${dataSicura}</td>
                            <td>€ ${parseFloat(o.totale).toFixed(2)}</td>
                            <td><span class="badge ${o.stato.replace(/\s+/g, '').toLowerCase()}">${o.stato}</span></td>
                            <td><button class="btn-azione" onclick="apriPopup('${o.id}')">Apri Scheda</button></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                })
                .catch(error => {
                    console.error('Errore:', error);
                    document.getElementById('tbody-storico').innerHTML = '<tr><td colspan="6" class="empty-state" style="color:red;">Errore nel caricamento dei dati.</td></tr>';
                });
        });

        // GESTIONE POPUP CON INGREDIENTI
        function apriPopup(idOrdineRaw) {
            const idOrdine = idOrdineRaw.replace('#', '');
            
            document.getElementById('popupTitolo').innerText = 'Dettagli Ordine #' + idOrdine;
            document.getElementById('popupDettagli').style.display = 'flex';
            document.getElementById('popupListaProdotti').innerHTML = '<div style="text-align:center; padding:20px; color:#777;"><em>Caricamento...</em></div>';
            document.getElementById('popupTotalePrezzo').innerText = '€ ...';
            
            fetch('GetDettaglioOrdineJson?id=' + idOrdine)
                .then(r => r.json())
                .then(data => {
                    let html = '<h4 style="color:#116C4A; margin-top:0; margin-bottom:10px;">Prodotti Ordinati:</h4>';
                    
                    if (data.prodotti && data.prodotti.length > 0) {
                        data.prodotti.forEach(p => {
                            let opzioniHtml = "";
                            if(p.opzioni && p.opzioni.length > 0) {
                                opzioniHtml = "<ul style='margin: 4px 0 0 20px; font-size: 12px; color: #d32f2f;'>";
                                p.opzioni.forEach(opt => {
                                    opzioniHtml += `<li><b>Aggiunta/Modifica:</b> ${opt.nome}</li>`;
                                });
                                opzioniHtml += "</ul>";
                            }
                            
                            let secretHtml = `
                            <div style="background:#f9f9f9; padding:10px; border-radius:6px; margin-top:8px; font-size:11px; color:#555; border-left:3px solid #116C4A;">
                                <div style="margin-bottom:4px;"><b>Ingredienti:</b> ${p.ingredienti}</div>
                                <div><b>Note Cucina:</b> ${p.ricetta}</div>
                            </div>`;

                            html += `<div style="border-bottom: 1px dashed #eee; padding-bottom: 15px; margin-bottom: 15px;">
                                        <div style="font-weight:600; font-size:15px; color:#333; display:flex; justify-content:space-between;">
                                            <span>${p.quantita}x ${p.nome}</span>
                                            <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                                        </div>
                                        ${opzioniHtml}
                                        ${secretHtml}
                                     </div>`;
                        });
                    } else {
                        html += '<p style="font-size:13px; color:#777;">Nessun dettaglio prodotto trovato.</p>';
                    }
                    
                    html += '<h4 style="margin: 25px 0 10px 0; color: #116C4A;">Storico Modifiche:</h4>';
                    if (data.storico && data.storico.length > 0) {
                        data.storico.forEach(s => {
                            let classeBadge = s.stato.replace(/\s+/g, '').toLowerCase();
                            html += `<div style="font-size:13px; border-bottom:1px solid #f5f5f5; padding:10px 0;">
                                        <b>${s.data}</b> - <span class="badge ${classeBadge}">${s.stato}</span><br>
                                        <i style="color:#777; font-size:12px; margin-top:4px; display:inline-block;">da: ${s.personale}</i>
                                     </div>`;
                        });
                    } else {
                        html += '<p style="font-size:13px; color:#777;">Nessuna modifica registrata finora.</p>';
                    }
                    
                    document.getElementById('popupListaProdotti').innerHTML = html;
                    document.getElementById('popupTotalePrezzo').innerText = '€ ' + parseFloat(data.totale).toFixed(2);
                })
                .catch(error => {
                    console.error('Errore:', error);
                    document.getElementById('popupListaProdotti').innerHTML = '<div style="color:red; text-align:center;">Errore nel caricamento dei dati.</div>';
                });
        }

        function chiudiPopup() { document.getElementById('popupDettagli').style.display = 'none'; }
        window.onclick = function(e) { if (e.target === document.getElementById('popupDettagli')) chiudiPopup(); }
    </script>
</body>
</html>
