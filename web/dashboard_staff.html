<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordini - Dashboard Staff</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            height: 100vh;
            color: #333;
        }

        
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #116C4A;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 15px;
        }

        .nav-item {
            text-decoration: none;
            color: #555;
            font-size: 15px;
            font-weight: 500;
            padding: 12px 15px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background-color: #f0f5f3;
            color: #116C4A;
        }

        .nav-item.active {
            background-color: #116C4A;
            color: #ffffff;
        }
        
        .logout {
            margin-top: auto;
            margin-bottom: 20px;
            color: #d9534f;
        }

        .logout:hover {
            background-color: #fdf0f0;
            color: #c9302c;
        }

        
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-top: 5px;
        }

        .live-feed {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-feed::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #2e7d32;
            border-radius: 50%;
        }

        
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: #116C4A;
            margin: 0;
        }

        
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .order-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .order-id {
            background-color: #116C4A;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            margin-right: 15px;
        }

        .customer-name {
            font-weight: 600;
            font-size: 16px;
        }

        .order-time {
            color: #d32f2f;
            font-size: 14px;
            font-weight: 500;
        }

        .order-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-section p {
            margin: 0;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-current {
            font-size: 18px;
            font-weight: 600;
            margin-top: 5px;
            color: #333;
        }

        .status-updated {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            font-style: italic;
        }

        .items-section {
            text-align: center;
        }

        .items-section p {
            margin: 0;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
        }

        .items-current {
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
        }

        .action-btn {
            background-color: #116C4A;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background-color: #0d5439;
        }
        
        .details-link {
            text-align: center;
            display: block;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
            color: #777;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .details-link:hover {
            color: #116C4A;
        }

        
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background-color: #fff; 
            padding: 30px; 
            border-radius: 10px; 
            width: 500px; 
            max-height: 90vh; 
            overflow-y: auto; 
            max-width: 90%; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            position: relative;
        }

        .modal-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #e0e0e0; 
            padding-bottom: 15px; 
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0; 
            font-size: 20px;
        }

        .close-btn {
            background: none; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }
        
        .badge {
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 600; 
            display: inline-block;
        }

        .badge.inserito { background-color: #fff3cd; color: #856404; }
        .badge.inpreparazione { background-color: #cce5ff; color: #004085; }
        .badge.pronto { background-color: #d1ecf1; color: #0c5460; }
        .badge.inconsegna { background-color: #e2d9f3; color: #4a238b; }
        .badge.consegnato { background-color: #d4edda; color: #155724; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e0e0e0; flex-direction: row; flex-wrap: wrap; align-items: center; padding-bottom: 15px; }
            .logo { width: 100%; padding: 15px; margin-bottom: 0; border-bottom: none; text-align: left; }
            .nav-menu { flex-direction: row; width: 100%; justify-content: flex-start; gap: 10px; flex-wrap: wrap; }
            .nav-item { font-size: 13px; padding: 8px 12px; }
            .logout { margin-top: 10px; }
            .main-content { padding: 15px; }
            .header-top { flex-direction: column; align-items: flex-start; gap: 15px; }
            .stats-container { flex-direction: column; gap: 10px; }
            .order-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .order-body { flex-direction: column; align-items: flex-start; gap: 15px; }
            .status-section, .items-section { text-align: left; }
            .action-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">WebDelivery</div>
        <div class="nav-menu">
           <a href="#" class="nav-item active">Gestione Ordini (Live)</a>    
           <a href="storico_staff.html" class="nav-item">Storico Staff</a>
        </div>
        <div class="nav-menu" style="margin-top: auto;">
            <a href="LogoutServlet" class="nav-item logout">Esci</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-top">
            <div>
                <h1>Gestione Attiva Ordini</h1>
                <div class="subtitle">Visualizzazione in tempo reale per lo staff di cucina e sala.</div>
            </div>
            <div class="live-feed">LIVE FEED ATTIVO</div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h1>Da Preparare</h1>
                <p class="number" id="stat-inseriti">0</p>
            </div>
            <div class="stat-card">
                <h2>In Cucina</h2>
                <p class="number" id="stat-prep">0</p>
            </div>
            <div class="stat-card">
                <h3>Pronti da Consegnare</h3>
                <p class="number" id="stat-pronti">0</p>
            </div>
        </div>

        <div class="order-list" id="lista-ordini-staff">
            <p style="text-align: center; color: #777; margin-top: 40px;">Caricamento ordini in corso...</p>
        </div>
    </div>

    <div id="popupDettagli" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="popupTitolo">Dettagli Ordine</h3>
                <button class="close-btn" onclick="chiudiPopup()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="popupListaProdotti"></div>
                <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 2px solid #e0e0e0; font-size: 18px; font-weight: 700;">
                    <span>Totale</span>
                    <span id="popupTotalePrezzo">€ 0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", caricaOrdiniStaff);

        function caricaOrdiniStaff() {
            fetch('GetOrdiniJson') 
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('lista-ordini-staff');
                    container.innerHTML = '';
                    
                    let countInseriti = 0, countPrep = 0, countPronti = 0;
                    const ordiniAttivi = data.filter(o => o.stato.toLowerCase() !== 'consegnato');

                    if (ordiniAttivi.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#777;">Nessun ordine attivo al momento.</p>';
                        return;
                    }

                    ordiniAttivi.forEach(o => {
                        const statoPulito = o.stato.toLowerCase();
                        
                        if (statoPulito === 'inserito') countInseriti++;
                        if (statoPulito === 'in preparazione') countPrep++;
                        if (statoPulito === 'pronto') countPronti++;

                        let testoBottone = "", prossimoStato = "";
                        if (statoPulito === 'inserito') { testoBottone = "Sposta in Preparazione"; prossimoStato = "in preparazione"; } 
                        else if (statoPulito === 'in preparazione') { testoBottone = "Segna come Pronto"; prossimoStato = "pronto"; } 
                        else if (statoPulito === 'pronto') { testoBottone = "Manda in Consegna"; prossimoStato = "in consegna"; } 
                        else if (statoPulito === 'in consegna') { testoBottone = "Segna Consegnato"; prossimoStato = "consegnato"; }

                        let modificatoDa = o.ultimo_staff ? o.ultimo_staff : "Sistema / Cliente";
                        
                        
                        let dataSicura = (o.orario && o.orario !== "Data non disp.") ? o.orario : (o.data_richiesta ? o.data_richiesta : 'Il prima possibile');

                        const card = `
                        <div class="order-card">
                            <div class="order-header">
                                <div><span class="order-id">#${o.id}</span><span class="customer-name">${o.cliente}</span></div>
                                <div class="order-time">Richiesto: ${dataSicura}</div>
                            </div>
                            <div class="order-body">
                                <div class="status-section">
                                    <p>Stato Attuale</p>
                                    <div class="status-current"><span class="badge ${statoPulito.replace(/\s+/g, '')}">${o.stato}</span></div>
                                    <div class="status-updated">Ultima mod: ${modificatoDa}</div>
                                </div>
                                <div class="items-section">
                                    <p>Riepilogo</p>
                                    <div class="items-current">Totale: € ${parseFloat(o.totale).toFixed(2)}</div>
                                </div>
                                <div>
                                    ${testoBottone ? `<button class="action-btn" onclick="cambiaStatoOrdine(${o.id}, '${prossimoStato}')">${testoBottone} &rarr;</button>` : ''}
                                </div>
                            </div>
                            <a class="details-link" onclick="apriPopup('${o.id}')">VEDI SCHEDA PIATTO E CRONOLOGIA COMPLETA</a>
                        </div>`;
                        
                        container.innerHTML += card;
                    });

                    document.getElementById('stat-inseriti').innerText = countInseriti;
                    document.getElementById('stat-prep').innerText = countPrep;
                    document.getElementById('stat-pronti').innerText = countPronti;
                })
                .catch(err => console.error("Errore:", err));
        }

        function cambiaStatoOrdine(idOrdine, nuovoStato) {
            if(!confirm(`Sei sicuro di voler passare l'ordine #${idOrdine} allo stato: ${nuovoStato}?`)) return;

            fetch('AggiornaStatoServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `id_ordine=${idOrdine}&nuovo_stato=${nuovoStato}`
            }).then(response => {
                if (response.ok) caricaOrdiniStaff(); 
                else alert("Errore durante l'aggiornamento dello stato.");
            }).catch(error => console.error('Errore:', error));
        }

        function apriPopup(idOrdine) {
            document.getElementById('popupTitolo').innerText = 'Dettagli Ordine #' + idOrdine;
            document.getElementById('popupDettagli').style.display = 'flex';
            document.getElementById('popupListaProdotti').innerHTML = 'Caricamento...';
            
            fetch('GetDettaglioOrdineJson?id=' + idOrdine)
                .then(r => r.json())
                .then(data => {
                    let html = '<h4 style="color:#116C4A; margin-top:0;">Prodotti da preparare:</h4>';
                    
                    if (data.prodotti && data.prodotti.length > 0) {
                        data.prodotti.forEach(p => {
                            // Info personalizzazioni
                            let opzioniHtml = "";
                            if(p.opzioni && p.opzioni.length > 0) {
                                opzioniHtml = "<ul style='margin: 4px 0 0 20px; font-size: 12px; color: #d32f2f;'>";
                                p.opzioni.forEach(opt => {
                                    opzioniHtml += `<li><b>Aggiunta/Modifica:</b> ${opt.nome}</li>`;
                                });
                                opzioniHtml += "</ul>";
                            }
                            
                            // Info Cucina
                            let secretHtml = `
                            <div style="background:#f9f9f9; padding:10px; border-radius:6px; margin-top:8px; font-size:11px; color:#555; border-left:3px solid #116C4A;">
                                <div style="margin-bottom:4px;"><b><i class="fas fa-carrot"></i> Ingredienti:</b> ${p.ingredienti}</div>
                                <div><b><i class="fas fa-blender"></i> Note Cucina:</b> ${p.ricetta}</div>
                            </div>`;

                            html += `<div style="border-bottom: 1px dashed #eee; padding-bottom: 15px; margin-bottom: 15px;">
                                        <div style="font-weight:600; font-size:15px; color:#333; display:flex; justify-content:space-between;">
                                            <span>${p.quantita}x ${p.nome}</span>
                                            <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                                        </div>
                                        ${opzioniHtml}
                                        ${secretHtml}
                                     </div>`;
                        });
                    } else {
                        html += '<p style="font-size:13px; color:#777;">Nessun dettaglio trovato.</p>';
                    }
                    
                    html += '<h4 style="color:#116C4A; margin-top:20px;">Storico Modifiche:</h4>';
                    if (data.storico) {
                        data.storico.forEach(s => {
                            let bClass = s.stato.replace(/\s+/g, '').toLowerCase();
                            html += `<div style="font-size:12px; border-bottom:1px solid #eee; padding:5px 0;">
                                        <b>${s.data}</b> - <span class="badge ${bClass}">${s.stato}</span><br>
                                        <i style="color:#777;">da: ${s.personale}</i>
                                     </div>`;
                        });
                    }
                    
                    document.getElementById('popupListaProdotti').innerHTML = html;
                    document.getElementById('popupTotalePrezzo').innerText = '€ ' + parseFloat(data.totale).toFixed(2);
                });
        }

        function chiudiPopup() { document.getElementById('popupDettagli').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('popupDettagli')) chiudiPopup(); }
    </script>
</body>
</html>
