<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo - WebDelivery</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            margin: 0; background-color: #f4f7f6; display: flex; height: 100vh; color: #333; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background-color: #ffffff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0;
        }
        .logo { font-size: 24px; font-weight: 700; color: #116C4A; padding: 30px 20px; text-align: center; border-bottom: 1px solid #e0e0e0; margin-bottom: 20px; text-decoration: none; display: block; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; padding: 25px 20px; }
        .nav-item { text-decoration: none; color: #555; font-size: 15px; font-weight: 500; padding: 14px 20px; border-radius: 8px; transition: all 0.2s; }
        .nav-item:hover:not(.active) { background-color: #f4f7f6; color: #116C4A; }
        .nav-item.active { background-color: #116C4A; color: #ffffff; box-shadow: 0 4px 10px rgba(17, 108, 74, 0.2); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        h1 { font-size: 32px; font-weight: 800; color: #0b3c29; margin-top: 0; margin-bottom: 30px; letter-spacing: -0.5px; }

        .profile-container { background-color: #ffffff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e0e0e0; max-width: 600px; margin: 0 auto; }
        
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .profile-avatar { width: 80px; height: 80px; background-color: #116C4A; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: bold; }
        .profile-title h2 { margin: 0; font-size: 24px; color: #333; }
        .profile-title p { margin: 5px 0 0 0; color: #777; font-size: 14px; }

        /* --- READ ONLY INFO --- */
        .info-group { margin-bottom: 15px; }
        .info-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        .info-group .info-value { font-size: 15px; color: #333; font-weight: 500; padding: 12px; background-color: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }

        /* --- FORM STYLES --- */
        .edit-section-title { margin-top: 40px; font-size: 18px; font-weight: 700; color: #116C4A; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background-color: #f9f9f9; outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .input-group input:focus, .input-group textarea:focus { border-color: #116C4A; background-color: #fff; }
        
        .btn-save { background-color: #116C4A; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-save:hover { background-color: #0d5439; }
        .btn-save:disabled { background-color: #888; cursor: not-allowed; }

        .btn-logout { background-color: #fdf0f0; color: #d9534f; border: 1px solid #f5c6cb; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; display: block; text-align: center; text-decoration: none; margin-top: 30px; }
        .btn-logout:hover { background-color: #f8d7da; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .nav-menu { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; }
            .nav-item { font-size: 13px; padding: 8px 12px; }
            .main-content { padding: 20px; overflow-y: visible; height: auto; }
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="dashboard.html" class="logo">WebDelivery</a>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-arrow-left"></i> Torna al menù</a>
            <a href="profilo.html" class="nav-item active">Il mio profilo</a>
            <a href="ordini.html" class="nav-item">I tuoi ordini</a>
        </div>
    </div>

    <div class="main-content">
        <h1>Il mio Profilo</h1>
        
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar-iniziale">?</div>
                <div class="profile-title">
                    <h2 id="p-nome-display">Caricamento...</h2>
                    <p id="p-ruolo">Cliente</p>
                </div>
            </div>
            
            <!-- DATI IN SOLA LETTURA -->
            <div class="info-group">
                <label>Email (Non modificabile)</label>
                <div class="info-value" id="p-email">Caricamento...</div>
            </div>
            <div class="form-grid">
                <div class="info-group">
                    <label>Telefono Salvato</label>
                    <div class="info-value" id="p-tel">Caricamento...</div>
                </div>
                <div class="info-group">
                    <label>Indirizzo Attuale</label>
                    <div class="info-value" id="p-ind" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Caricamento...</div>
                </div>
            </div>

            <h3 class="edit-section-title"><i class="fas fa-edit"></i> Modifica i tuoi dati</h3>
            
            <!-- FORM DI MODIFICA (Senza Action/Method, gestito da JS) -->
            <form id="formProfilo">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nuovo Nome Completo</label>
                        <input type="text" name="nome" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label>Nuovo Telefono</label>
                        <input type="text" name="telefono" id="telefono">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Nuovo Indirizzo di Consegna</label>
                    <textarea name="indirizzo" id="indirizzo" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn-save" id="btn-save"><i class="fas fa-save"></i> Salva Modifiche</button>
            </form>

            <a href="LogoutServlet" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Esci dall'account</a>
        </div>
    </div>

    <script>
        // Funzione per scaricare i dati dal database e popolare sia i riquadri grigi che i form
        function caricaDatiProfilo() {
            fetch('ProfiloServlet')
                .then(response => {
                    if (!response.ok) window.location.href = "login.html";
                    return response.json();
                })
                .then(data => {
                    if(data.nome) {
                        // Visualizzazione in sola lettura (Header)
                        document.getElementById('p-nome-display').innerText = data.nome;
                        document.getElementById('avatar-iniziale').innerText = data.nome.charAt(0).toUpperCase();
                        
                        if(data.ruolo) {
                            document.getElementById('p-ruolo').innerText = data.ruolo.charAt(0).toUpperCase() + data.ruolo.slice(1);
                        }
                        
                        // Visualizzazione in sola lettura - Controlliamo se sono vuoti
                        document.getElementById('p-email').innerText = (data.email && data.email.trim() !== '') ? data.email : "Non specificata";
                        document.getElementById('p-tel').innerText = (data.telefono && data.telefono.trim() !== '') ? data.telefono : "Nessun telefono salvato";
                        document.getElementById('p-ind').innerText = (data.indirizzo && data.indirizzo.trim() !== '') ? data.indirizzo : "Nessun indirizzo salvato";

                        // Campi del form pronti per essere sovrascritti
                        document.getElementById('nome').value = data.nome || '';
                        document.getElementById('telefono').value = data.telefono || '';
                        document.getElementById('indirizzo').value = data.indirizzo || '';
                    }
                })
                .catch(error => { 
                    console.error('Errore nel recupero profilo:', error); 
                });
        }

        // 1. Carica i dati appena apri la pagina
        document.addEventListener('DOMContentLoaded', caricaDatiProfilo);

        // 2. Salva i dati senza ricaricare la pagina
        document.getElementById('formProfilo').addEventListener('submit', function(e) {
            e.preventDefault(); // Blocca il caricamento standard della pagina HTML

            const btn = document.getElementById('btn-save');
            const originalText = btn.innerHTML;
            
           
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio in corso...';
            btn.disabled = true;

            // Prepara i dati da inviare alla Servlet
            const dati = new URLSearchParams();
            dati.append('nome', document.getElementById('nome').value);
            dati.append('telefono', document.getElementById('telefono').value);
            dati.append('indirizzo', document.getElementById('indirizzo').value);

            // Invia i dati in background
            fetch('ProfiloServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: dati
            })
            .then(res => {
                btn.innerHTML = originalText;
                btn.disabled = false;

                if(res.ok) {
                   
                    caricaDatiProfilo();
                    alert("✅ Modifiche salvate con successo!");
                } else {
                    alert("❌ Errore durante il salvataggio dei dati.");
                }
            })
            .catch(err => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert("🚨 Errore di rete. Controlla la tua connessione.");
            });
        });
    </script>
</body>
</html>
